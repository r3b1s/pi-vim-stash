[tools]
pnpm = "11"
node = "lts"
python = "3.11"

[env]
_.path = ["./scripts/bin"]

[tasks.install]
run = "pnpm install"
sources = ["pnpm-workspace.yaml", "packages/*/package.json"]
outputs = ["node_modules/.pnpm/lock.yaml"]

[tasks.check]
run = "pnpm -r run check"
depends = ["install"]

[tasks."lint:biome"]
run = "biome check ."
depends = ["install"]

[tasks."lint:eslint"]
run = "eslint packages/"
depends = ["install"]

[tasks.lint]
run = "pnpm run lint"
depends = ["install"]

[tasks.test]
run = "pnpm -r run test"
depends = ["install"]

[tasks.format]
run = "pnpm run format"

[tasks.ci]
depends = ["check", "lint", "test"]

[tasks.clean]
run = "pnpm run clean"

[tasks."test-python"]
run = """
cd packages/pi-holo-mem && \
python3 -m venv /tmp/pi-holo-mem-test-venv && \
/tmp/pi-holo-mem-test-venv/bin/pip install --quiet -r python/requirements.txt pytest && \
/tmp/pi-holo-mem-test-venv/bin/pytest python/tests/ -v && \
rm -rf /tmp/pi-holo-mem-test-venv
"""
