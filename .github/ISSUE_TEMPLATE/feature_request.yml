name: Feature Request
description: Suggest a feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package does this relate to?
      multiple: true
      options:
        - pi-holo-mem
        - pi-skill-creator
        - pi-token-killer
        - pi-vim-stash
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What do you want to change?
      description: Describe the feature or improvement.
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why?
      description: What problem does this solve? What's your use case?
    validations:
      required: true

  - type: textarea
    id: how
    attributes:
      label: How? (optional)
      description: Suggested implementation approach, if any.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've considered, if any.
    validations:
      required: false
